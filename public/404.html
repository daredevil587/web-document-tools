<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found · DocPrivacy Tools</title>
  <meta name="description" content="Page not found. Return to DocPrivacy Tools — free PDF and image tools." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --bg: #f8fafc;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --surface: #ffffff;
    }
    [data-theme="dark"] {
      --bg: #0f172a; --surface: #1e293b;
      --text: #f1f5f9; --text-muted: #94a3b8; --border: #334155;
    }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
      -webkit-font-smoothing: antialiased;
    }
    .container { max-width: 480px; }
    .code {
      font-size: clamp(5rem, 20vw, 8rem);
      font-weight: 900; line-height: 1;
      background: linear-gradient(135deg, #4f46e5, #7c3aed, #a855f7);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 16px;
      letter-spacing: -4px;
    }
    h1 { font-size: 1.5rem; font-weight: 800; margin-bottom: 10px; }
    p { color: var(--text-muted); margin-bottom: 28px; line-height: 1.65; }
    a {
      display: inline-flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff; text-decoration: none;
      padding: 13px 28px; border-radius: 12px;
      font-weight: 700; font-size: 0.95rem;
      box-shadow: 0 4px 16px rgba(99,102,241,0.35);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    a:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(99,102,241,0.45); }
  </style>
  <script>
    const saved = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
  </script>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or has been moved.<br/>
       Head back to the homepage to access all tools.</p>
    <a href="/web-document-tools/">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"
          stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="9 22 9 12 15 12 15 22"
          stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Go to Homepage
    </a>
  </div>
</body>
</html>
